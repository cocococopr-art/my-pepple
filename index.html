<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>My People — 人脈ノート</title>

<!-- PWA / ICON -->
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png" />
<meta name="theme-color" content="#2c4a7c" />
<meta name="apple-mobile-web-app-title" content="My People" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Zen+Kurenaido&display=swap" rel="stylesheet">

<style>
:root{
  --cover:#2c4a7c;
  --spine:#1e3560;
  --page:#fefcf5;
  --page2:#faf6ec;
  --line:rgba(100,140,210,.18);
  --margin:#e8a0a0;
  --ink:#1a1410;
  --ink2:#4a3e30;
  --muted:#8d8378;
  --blue:#1e3a8a;
  --red:#c0302a;
  --green:#2d6b3a;
  --yellow:#fff9c4;
  --pink:#fce4ec;
  --sky:#e1f5fe;
  --mint:#e8f5e9;
  --font:'Yomogi','Zen Kurenaido',cursive;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;margin:0;padding:0}

html,body{
  min-height:100%;
  font-family:var(--font);
  color:var(--ink);
  background:#b8b0a0;
  overflow-x:hidden;
}

body{
  background:
    radial-gradient(ellipse at 20% 15%,#d2caba 0%,transparent 48%),
    radial-gradient(ellipse at 80% 85%,#aaa298 0%,transparent 52%),
    #b8b0a0;
}

/* APP */
.app{
  display:flex;
  max-width:1180px;
  min-height:100dvh;
  margin:0 auto;
  padding:20px 16px;
  gap:22px;
}

/* PC SIDEBAR */
.sidebar{
  width:220px;
  flex-shrink:0;
  position:sticky;
  top:20px;
  min-height:520px;
  border-radius:10px 0 0 10px;
  background:linear-gradient(160deg,#2a4880 0%,var(--spine) 48%,#243f6e 100%);
  box-shadow:-2px 0 0 #1a2e50,4px 0 18px rgba(0,0,0,.26),inset -5px 0 8px rgba(0,0,0,.18);
  overflow:hidden;
}

.sidebar::before{
  content:'';
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(transparent 0,transparent 32px,rgba(0,0,0,.13) 32px,rgba(0,0,0,.13) 34px);
  pointer-events:none;
}

.sidebar-inner{
  position:relative;
  z-index:2;
  height:100%;
  padding:24px 16px;
  display:flex;
  flex-direction:column;
}

.sidebar-logo{
  color:#fff;
  font-size:23px;
  font-weight:800;
  letter-spacing:1px;
  line-height:1;
}
.sidebar-sub{
  color:rgba(255,255,255,.58);
  font-size:11px;
  letter-spacing:2px;
  margin-top:5px;
  margin-bottom:28px;
}

.side-nav{
  display:flex;
  flex-direction:column;
  gap:5px;
  flex:1;
}

.nav-btn{
  border:none;
  border-radius:8px;
  background:transparent;
  color:rgba(255,255,255,.68);
  padding:11px 12px;
  font-family:var(--font);
  font-size:15px;
  font-weight:800;
  text-align:left;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:9px;
  transition:.15s;
}
.nav-btn:hover,.nav-btn.active{
  background:rgba(255,255,255,.16);
  color:#fff;
}
.nav-btn svg{
  width:18px;height:18px;
  stroke:currentColor;
  fill:none;
  stroke-width:2.2;
}

.side-footer{
  border-top:1px solid rgba(255,255,255,.12);
  padding-top:14px;
}
.side-mini{
  width:100%;
  border:none;
  background:transparent;
  color:rgba(255,255,255,.58);
  font-family:var(--font);
  font-size:13px;
  font-weight:700;
  text-align:left;
  cursor:pointer;
  padding:8px 10px;
  border-radius:7px;
}
.side-mini:hover{background:rgba(255,255,255,.1);color:#fff}

/* NOTEBOOK */
.notebook{
  flex:1;
  min-width:0;
  position:relative;
  border-radius:0 12px 12px 0;
  box-shadow:4px 9px 34px rgba(0,0,0,.28);
}

.nb-spine{
  position:absolute;
  left:0;top:0;bottom:0;
  width:28px;
  z-index:2;
  background:linear-gradient(135deg,var(--spine) 0%,#2a4880 55%,var(--spine) 100%);
  box-shadow:inset -3px 0 7px rgba(0,0,0,.22);
}
.nb-spine::before{
  content:'';
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(transparent 0,transparent 28px,rgba(0,0,0,.14) 28px,rgba(0,0,0,.14) 30px);
}

.nb-page{
  margin-left:28px;
  min-height:calc(100dvh - 40px);
  border-radius:0 12px 12px 0;
  position:relative;
  background-color:var(--page);
  background-image:
    linear-gradient(90deg,transparent 56px,var(--margin) 56px,var(--margin) 57.5px,transparent 57.5px),
    repeating-linear-gradient(transparent 0,transparent 27px,var(--line) 27px,var(--line) 28px);
  background-position:0 0,0 38px;
  overflow:hidden;
}
.nb-page::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:5px;
  background:linear-gradient(90deg,rgba(0,0,0,.06),transparent);
  z-index:1;
  pointer-events:none;
}

.page-inner{
  position:relative;
  z-index:2;
  padding-bottom:40px;
}

/* MOBILE RIGHT STICKY TABS */
.mobile-page-tabs{
  display:none;
}

.tab-panel{display:none}
.tab-panel.active{display:block}

/* SEARCH TOP */
.search-page{
  min-height:calc(100dvh - 40px);
  padding:0 28px 50px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.hero{
  text-align:center;
  margin-top:clamp(42px,10vh,90px);
  margin-bottom:30px;
}

.logo{
  font-size:clamp(38px,7vw,60px);
  font-weight:900;
  letter-spacing:1px;
  line-height:1;
  display:flex;
  justify-content:center;
  gap:2px;
}
.logo span:nth-child(1){color:#4285F4}
.logo span:nth-child(2){color:#EA4335}
.logo span:nth-child(3){color:#FBBC05}
.logo span:nth-child(4){color:#4285F4}
.logo span:nth-child(5){color:#34A853}
.logo span:nth-child(6){color:#EA4335}
.logo span:nth-child(7){color:#4285F4}
.logo span:nth-child(8){color:#FBBC05}
.logo span:nth-child(9){color:#34A853}

.logo-sub{
  margin-top:8px;
  color:var(--muted);
  font-size:13px;
  font-weight:800;
  letter-spacing:2px;
}

.search-mark{
  margin:26px auto 18px;
  width:76px;height:76px;
  border-radius:50%;
  background:rgba(30,58,138,.09);
  display:flex;
  align-items:center;
  justify-content:center;
}
.search-mark svg{
  width:40px;height:40px;
  stroke:var(--blue);
  stroke-width:2.7;
  fill:none;
}

/* REQUESTED SEARCH BAR */
.sp-search-wrap{
  width:100%;
  max-width:680px;
  margin:0 auto;
  position:relative;
}

.sp-search-bar{
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
  background:#fff;
  border:2px solid #e2e5ee;
  border-radius:999px;
  padding:12px 14px;
  box-shadow:0 4px 14px rgba(0,0,0,.06);
}

.sp-input{
  flex:1;
  min-width:0;
  border:none;
  outline:none;
  background:transparent;
  font-family:var(--font);
  font-size:18px;
  font-weight:800;
  color:var(--ink);
}
.sp-input::placeholder{
  color:#8c90a0;
  font-weight:700;
}

.sp-search-submit{
  width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  background:var(--blue);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
  box-shadow:0 4px 12px rgba(30,58,138,.25);
  transition:.15s;
}
.sp-search-submit:active{transform:scale(.94)}
.sp-search-submit svg{
  width:22px;height:22px;
  stroke:#fff;
  stroke-width:2.6;
  fill:none;
}

.sp-results{
  width:100%;
  margin-top:10px;
  background:#fff;
  border:1px solid #e2e5ee;
  border-radius:18px;
  box-shadow:0 8px 22px rgba(0,0,0,.1);
  overflow:hidden;
  display:none;
}
.sp-results.show{display:block}

.sp-result-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 16px;
  cursor:pointer;
  border-bottom:1px solid #f0eee8;
}
.sp-result-item:last-child{border-bottom:none}
.sp-result-item:hover{background:#faf7ee}

.avatar{
  width:40px;height:40px;
  border-radius:50%;
  background:#e8e0d0;
  border:1.5px solid #c0b0a0;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-size:17px;
  font-weight:900;
  color:var(--ink2);
  flex-shrink:0;
}
.avatar img{width:100%;height:100%;object-fit:cover}
.res-body{flex:1;min-width:0}
.res-name{
  color:var(--blue);
  font-size:17px;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.res-sub{
  color:var(--muted);
  font-size:12px;
  font-weight:700;
  margin-top:2px;
}
.no-result{
  padding:28px 18px;
  color:var(--muted);
  font-size:15px;
  text-align:center;
  font-weight:800;
}

.quick{
  width:100%;
  max-width:680px;
  margin-top:32px;
}
.quick-title{
  font-size:13px;
  font-weight:900;
  color:var(--muted);
  border-bottom:1px dashed var(--margin);
  padding-bottom:6px;
  margin-bottom:12px;
}
.quick-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
}
.quick-card{
  background:#fff;
  border:1px solid #e8e0d4;
  border-radius:12px;
  padding:14px 10px;
  text-align:center;
  cursor:pointer;
  box-shadow:1px 3px 8px rgba(0,0,0,.07);
}
.quick-card:hover{transform:translateY(-2px)}
.quick-card .avatar{margin:0 auto 8px}
.quick-name{
  color:var(--blue);
  font-size:14px;
  font-weight:900;
  line-height:1.3;
}
.quick-sub{
  color:var(--muted);
  font-size:11px;
  font-weight:800;
  margin-top:3px;
}

/* LIST */
.list-page{
  padding:22px 18px 70px 68px;
}

.page-title-card{
  display:inline-block;
  position:relative;
  background:#fff;
  border:2px solid #bbb;
  border-radius:8px;
  padding:8px 16px;
  box-shadow:1px 3px 5px rgba(0,0,0,.08);
}
.page-title-card::before{
  content:'';
  position:absolute;
  top:-10px;left:50%;
  transform:translateX(-50%) rotate(-2deg);
  width:96px;height:18px;
  background:rgba(180,210,255,.6);
  border-left:2px dashed rgba(100,150,220,.25);
  border-right:2px dashed rgba(100,150,220,.25);
}
.page-title{
  color:var(--cover);
  font-size:28px;
  font-weight:900;
  line-height:1;
}
.page-sub{
  margin-top:4px;
  color:var(--muted);
  font-size:12px;
  font-weight:800;
  letter-spacing:1px;
}

.toolbar{
  margin-top:18px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:8px;
}
.chip{
  border:1.5px solid #bbb;
  background:#fff;
  color:var(--ink2);
  border-radius:999px;
  padding:5px 12px;
  font-family:var(--font);
  font-weight:900;
  font-size:13px;
  cursor:pointer;
}
.chip.active,.chip:hover{
  background:var(--cover);
  color:#fff;
  border-color:var(--cover);
}
.count{
  margin-left:auto;
  color:var(--red);
  font-size:13px;
  font-weight:900;
}

.cards{
  margin-top:16px;
}
.person-card{
  position:relative;
  display:flex;
  gap:12px;
  align-items:center;
  background:rgba(255,255,255,.54);
  border-bottom:1px solid rgba(100,140,210,.16);
  padding:12px 8px;
  cursor:pointer;
}
.person-card:hover{background:rgba(255,251,228,.9)}
.card-body{flex:1;min-width:0}
.card-name{
  color:var(--blue);
  font-size:18px;
  font-weight:900;
  display:inline-block;
  border-bottom:1.8px solid currentColor;
}
.card-yomi{
  color:var(--muted);
  font-size:11px;
  font-weight:800;
  margin-left:7px;
}
.card-meta{
  margin-top:6px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:center;
}
.tag{
  font-size:11px;
  font-weight:900;
  border:1.5px solid currentColor;
  border-radius:999px;
  padding:2px 8px;
}
.tag.red{color:var(--red)}
.tag.blue{color:var(--blue)}
.tag.green{color:var(--green)}
.company{
  color:var(--ink2);
  font-size:12px;
  font-weight:800;
}
.empty{
  text-align:center;
  padding:70px 20px;
  color:var(--muted);
}
.empty .icon{font-size:44px;margin-bottom:10px}
.empty h3{
  color:var(--blue);
  font-size:22px;
  margin-bottom:5px;
}

/* SETTINGS */
.setup{
  display:none;
  margin:18px 18px 0 68px;
  background:#eef4fc;
  border:1.5px dashed #90b0e0;
  border-radius:10px;
  padding:14px;
  position:relative;
}
.setup.show{display:block}
.setup h3{
  color:var(--blue);
  font-size:16px;
  font-weight:900;
  margin-bottom:6px;
}
.setup p{
  color:var(--ink2);
  font-size:12px;
  font-weight:800;
  line-height:1.7;
  margin-bottom:10px;
}
.setup-row{
  display:flex;
  gap:8px;
}
.setup input{
  flex:1;
  border:1.5px solid rgba(58,127,193,.35);
  background:#fff;
  border-radius:8px;
  padding:10px 12px;
  font-family:var(--font);
  font-size:14px;
  font-weight:800;
  outline:none;
}

/* BUTTONS */
.btn{
  border:none;
  border-radius:8px;
  padding:10px 14px;
  font-family:var(--font);
  font-size:15px;
  font-weight:900;
  cursor:pointer;
}
.btn-primary{
  background:linear-gradient(135deg,#2c4a8a,#1e3570);
  color:#fff;
  box-shadow:2px 3px 0 #0e1a40;
}
.btn-ghost{
  background:#fff;
  border:1.5px solid #c0b8a8;
  color:var(--ink2);
}
.btn-danger{
  background:#b62828;
  color:#fff;
}

/* FAB */
.add-fab{
  position:fixed;
  right:22px;
  bottom:calc(24px + var(--safe-bottom));
  width:62px;
  height:62px;
  border-radius:50%;
  border:2px solid #c8901a;
  background:linear-gradient(135deg,#f5c842,#e8a820);
  box-shadow:2px 4px 0 #a07010,inset 0 1px 0 rgba(255,255,255,.4);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:800;
}
.add-fab svg{
  width:28px;height:28px;
  stroke:#5a3a00;
  stroke-width:2.8;
  fill:none;
}

/* MODAL */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(20,16,10,.52);
  backdrop-filter:blur(3px);
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  opacity:0;
  pointer-events:none;
  transition:.2s;
}
.overlay.open{
  opacity:1;
  pointer-events:auto;
}
.modal{
  width:100%;
  max-width:650px;
  max-height:90dvh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  border-radius:16px;
  background-color:var(--page);
  background-image:
    linear-gradient(90deg,transparent 58px,var(--margin) 58px,var(--margin) 59.5px,transparent 59.5px),
    repeating-linear-gradient(transparent 0,transparent 27px,var(--line) 27px,var(--line) 28px);
  background-position:0 0,0 48px;
  box-shadow:0 22px 70px rgba(0,0,0,.34);
}
.modal-head{
  padding:16px 18px 13px 70px;
  border-bottom:2px solid var(--margin);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.modal-title{
  color:var(--blue);
  font-size:21px;
  font-weight:900;
}
.close{
  width:32px;height:32px;
  border-radius:50%;
  border:1.5px solid #c8bfb0;
  background:#f0ece4;
  color:var(--ink2);
  font-weight:900;
  cursor:pointer;
}
.modal-body{
  overflow-y:auto;
  padding:18px 20px 14px 70px;
  -webkit-overflow-scrolling:touch;
}
.modal-footer{
  padding:12px 18px 18px 70px;
  background:var(--page2);
  border-top:1px solid var(--line);
  display:flex;
  gap:8px;
}

/* FORM */
.note-block{
  position:relative;
  padding:14px;
  margin-bottom:16px;
  border-radius:6px;
  box-shadow:2px 4px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.65);
}
.note-block::before{
  content:'';
  position:absolute;
  top:-9px;left:50%;
  transform:translateX(-50%) rotate(-1.5deg);
  width:64px;height:15px;
  background:rgba(255,200,150,.58);
}
.bg-y{background:var(--yellow)}
.bg-b{background:var(--sky)}
.bg-g{background:var(--mint)}
.bg-p{background:var(--pink)}
.block-title{
  color:var(--ink2);
  font-size:14px;
  font-weight:900;
  border-bottom:1px dashed rgba(0,0,0,.15);
  padding-bottom:6px;
  margin-bottom:10px;
}
.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.field.full{grid-column:1/-1}
.field label{
  color:rgba(0,0,0,.46);
  display:block;
  font-size:12px;
  font-weight:900;
  margin-bottom:3px;
}
.field input,.field select,.field textarea{
  width:100%;
  border:none;
  border-bottom:1.6px solid rgba(0,0,0,.18);
  background:transparent;
  outline:none;
  padding:6px 0;
  font-family:var(--font);
  font-size:17px;
  font-weight:800;
  color:var(--ink);
}
.field textarea{
  min-height:72px;
  resize:vertical;
  line-height:1.7;
}

/* DETAIL */
.detail-hero{
  display:flex;
  gap:14px;
  align-items:flex-start;
  margin-bottom:16px;
}
.detail-photo{
  width:72px;height:88px;
  border-radius:8px;
  background:#e8e0d0;
  border:2px solid #a09080;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  color:var(--ink2);
  font-size:30px;
  font-weight:900;
  flex-shrink:0;
}
.detail-photo img{width:100%;height:100%;object-fit:cover}
.detail-name{
  color:var(--blue);
  font-size:28px;
  font-weight:900;
  display:inline-block;
  border-bottom:2px solid currentColor;
}
.detail-yomi{
  color:var(--muted);
  font-size:12px;
  font-weight:800;
  margin-top:4px;
}
.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px 16px;
}
.info.full{grid-column:1/-1}
.info-label{
  color:rgba(0,0,0,.45);
  font-size:12px;
  font-weight:900;
}
.info-val{
  color:var(--ink);
  font-size:17px;
  font-weight:800;
  line-height:1.65;
  word-break:break-word;
}
.info-val a{color:var(--blue);text-decoration:none}

.meeting{
  display:flex;
  gap:10px;
  padding:7px 0;
  border-bottom:1px dashed rgba(100,140,210,.18);
}
.meet-date{
  min-width:86px;
  color:var(--red);
  font-size:12px;
  font-weight:900;
}
.meet-note{
  color:var(--ink2);
  font-size:15px;
  font-weight:800;
  line-height:1.5;
}
.add-meeting{
  display:grid;
  grid-template-columns:120px 1fr auto;
  gap:8px;
  align-items:end;
  margin-top:10px;
}
.add-meeting input{
  border:none;
  border-bottom:1.5px solid var(--red);
  background:transparent;
  padding:6px 0;
  outline:none;
  font-family:var(--font);
  font-weight:800;
}

/* TOAST */
.toast{
  position:fixed;
  left:50%;
  bottom:calc(24px + var(--safe-bottom));
  transform:translateX(-50%) translateY(14px);
  background:var(--ink);
  color:#fff;
  border-radius:999px;
  padding:10px 20px;
  font-size:15px;
  font-weight:900;
  z-index:2000;
  opacity:0;
  pointer-events:none;
  transition:.2s;
  white-space:nowrap;
}
.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
.toast.ok{background:var(--green)}
.toast.ng{background:var(--red)}

/* MOBILE */

  .search-page{

<body>
<div class="app">

  <aside class="sidebar">
    <div class="sidebar-inner">
      <div>
        <div class="sidebar-logo">My People</div>
        <div class="sidebar-sub">人脈ノート</div>
      </div>

      <nav class="side-nav">
        <button class="nav-btn active" id="pcTabSearch" onclick="switchTab('search')">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

        </button>
        <button class="nav-btn" id="pcTabList" onclick="switchTab('list')">
          <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>
          登録一覧
        </button>
        <button class="nav-btn" onclick="openAdd()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

      </nav>

    </div>

  <main class="notebook">

    <div class="nb-page">

      <div class="mobile-page-tabs">
        <button class="mobile-page-tab active" id="mTabSearch" onclick="switchTab('search')">検索</button>
        <button class="mobile-page-tab" id="mTabList" onclick="switchTab('list')">一覧</button>
        <button class="mobile-page-tab" onclick="toggleSetup()">設定</button>
      </div>

      <div class="page-inner">

        <section class="setup" id="setupBox">
          <h3>🔗 Google Sheets 連携</h3>

          <div class="setup-row">
            <input id="gasUrlInp" type="url" placeholder="https://script.google.com/macros/s/…/exec">
            <button class="btn btn-primary" onclick="saveGasUrl()">保存</button>
            <button class="btn btn-ghost" onclick="syncFromSheets()">同期</button>
          </div>
        </section>

        <section class="tab-panel active" id="panel-search">
          <div class="search-page">
            <div class="hero">
              <div class="logo">
                <span>M</span><span>y</span><span>&nbsp;</span><span>P</span><span>e</span><span>o</span><span>p</span><span>l</span><span>e</span>
              </div>
              <div class="logo-sub">人脈ノート</div>

              <div class="search-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <circle cx="11" cy="11" r="7"></circle>
                  <line x1="16" y1="16" x2="21" y2="21"></line>
                </svg>
              </div>
            </div>

            <div class="sp-search-wrap">
              <div class="sp-search-bar">
                <input
                  class="sp-input"
                  id="spInput"
                  type="text"
                  placeholder="どなたを知りたいですか？"
                  oninput="spSearch()"
                  onkeypress="if(event.key==='Enter'){spSearch()}"
                  autocomplete="off"
                />
                <button class="sp-search-submit" onclick="spSearch()" aria-label="検索">
                  <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="7"></circle>
                    <line x1="16" y1="16" x2="21" y2="21"></line>
                  </svg>
                </button>
              </div>
              <div class="sp-results" id="spResults"></div>
            </div>

            <div class="quick">
              <div class="quick-title">最近登録した人</div>
              <div class="quick-grid" id="quickGrid"></div>
            </div>
          </div>
        </section>

        <section class="tab-panel" id="panel-list">
          <div class="list-page">
            <div class="page-title-card">
              <div class="page-title">My People</div>
              <div class="page-sub">人脈ノート ✦ 登録一覧</div>
            </div>

            <div class="toolbar" id="filterRow">
              <button class="chip active" onclick="setFilter('')">すべて</button>
              <div class="count" id="countNote">0 人</div>
            </div>

            <div class="cards" id="cardsList"></div>
          </div>
        </section>

      </div>
    </div>
  </main>
</div>

<button class="add-fab" onclick="openAdd()" aria-label="人物を追加">
  <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- ADD / EDIT MODAL -->
<div class="overlay" id="editOverlay" onclick="bgClose(event,'editOverlay')">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="editTitle">✏️ 人物を追加</div>
      <button class="close" onclick="closeModal('editOverlay')">×</button>

    <div class="modal-body">
      <div class="note-block bg-y">

          <div class="field"><label>名前 *</label><input id="f_name" type="text" placeholder="田中 太郎"></div>
          <div class="field"><label>ふりがな</label><input id="f_yomi" type="text" placeholder="たなか たろう"></div>
          <div class="field"><label>会社 / 所属</label><input id="f_company" type="text" placeholder="株式会社〇〇"></div>
          <div class="field"><label>関係</label><input id="f_relation" type="text" placeholder="友人 / 先輩 / 取引先"></div>
          <div class="field"><label>初めて会った日</label><input id="f_met_date" type="date"></div>
          <div class="field"><label>MBTI</label>

              <option value="">—</option>
              <option>INTJ</option><option>INTP</option><option>ENTJ</option><option>ENTP</option>
              <option>INFJ</option><option>INFP</option><option>ENFJ</option><option>ENFP</option>
              <option>ISTJ</option><option>ISFJ</option><option>ESTJ</option><option>ESFJ</option>
              <option>ISTP</option><option>ISFP</option><option>ESTP</option><option>ESFP</option>

          <div class="field"><label>電話番号</label><input id="f_phone" type="tel" placeholder="090-0000-0000"></div>
          <div class="field"><label>メール</label><input id="f_email" type="email" placeholder="example@email.com"></div>
          <div class="field full"><label>住所</label><input id="f_address" type="text" placeholder="東京都..."></div>
          <div class="field full"><label>SNS URL</label><input id="f_sns_url" type="url" placeholder="https://..."></div>

      <div class="note-block bg-g">
        <div class="block-title">🌿 趣味・嗜好</div>
        <div class="form-grid">
          <div class="field"><label>好きなもの</label><input id="f_likes" type="text" placeholder="コーヒー、旅行..."></div>
          <div class="field"><label>苦手なもの</label><input id="f_dislikes" type="text" placeholder="満員電車..."></div>
        </div>

      <div class="note-block bg-p">
        <div class="block-title">📝 メモ・写真</div>
        <div class="form-grid">
          <div class="field full"><label>メモ</label><textarea id="f_note" placeholder="出会いのエピソード、会話メモなど"></textarea></div>
          <div class="field full">
  <label>写真</label>

  <div class="photo-upload-box">
    <input
      id="f_photo_file"
      type="file"
      accept="image/*"
      onchange="handlePhotoFile(event)"
    >
    <div class="photo-upload-text">
      写真を選択する
    </div>
    <img id="photoPreview" class="photo-preview" style="display:none;">
  </div>

    id="f_photo_url"
    type="url"
    placeholder="または画像URLを入力"
  >

        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('editOverlay')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveContact()">保存する</button>

  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailOverlay" onclick="bgClose(event,'detailOverlay')">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">📋 プロフィール</div>
      <button class="close" onclick="closeModal('detailOverlay')">×</button>
    </div>

    <div class="modal-body" id="detailBody"></div>

    <div class="modal-footer">
      <button class="btn btn-danger" onclick="deleteContact()">削除</button>
      <button class="btn btn-ghost" onclick="openEditFromDetail()">編集</button>
      <button class="btn btn-primary" onclick="closeModal('detailOverlay')">閉じる</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DATA_KEY = 'my_people_contacts_v1';
const GAS_KEY = 'my_people_gas_url_v1';

let contacts = [];
let editingId = null;
let viewingId = null;
let activeFilter = '';

const $ = (id) => document.getElementById(id);

function today(){
  return new Date().toISOString().slice(0,10);
}

function esc(v){
  return String(v ?? '').replace(/[&<>"']/g, s => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[s]));
}

function initials(name){
  const n = (name || '?').trim();
  return n ? n[0] : '?';
}

function avatarHtml(p, cls='avatar'){
  if(p.photo_url){
    return `<div class="${cls}"><img src="${esc(p.photo_url)}" alt=""></div>`;
  }
  return `<div class="${cls}">${esc(initials(p.name))}</div>`;
}

function showToast(msg, type='ok'){
  const t = $('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 2200);
}

function loadLocal(){
  try{
    contacts = JSON.parse(localStorage.getItem(DATA_KEY) || '[]');
  }catch(e){
    contacts = [];
  }

  const gas = localStorage.getItem(GAS_KEY);
  if(gas) $('gasUrlInp').value = gas;

  renderAll();
}

function saveLocal(){
  localStorage.setItem(DATA_KEY, JSON.stringify(contacts));
}

function renderAll(){
  renderQuick();
  renderList();
  buildFilters();
  spSearch(false);
}

function switchTab(tab){
  $('panel-search').classList.toggle('active', tab === 'search');
  $('panel-list').classList.toggle('active', tab === 'list');

  $('pcTabSearch')?.classList.toggle('active', tab === 'search');
  $('pcTabList')?.classList.toggle('active', tab === 'list');
  $('mTabSearch')?.classList.toggle('active', tab === 'search');
  $('mTabList')?.classList.toggle('active', tab === 'list');

  if(tab === 'list') renderList();
  window.scrollTo({top:0, behavior:'smooth'});
}

function toggleSetup(){
  $('setupBox').classList.toggle('show');
}

function saveGasUrl(){
  const url = $('gasUrlInp').value.trim();
  if(!url){
    localStorage.removeItem(GAS_KEY);
    showToast('URLを削除しました');
    return;
  }
  localStorage.setItem(GAS_KEY, url);
  showToast('Apps Script URLを保存しました');
}

async function syncFromSheets(){
  const url = localStorage.getItem(GAS_KEY) || $('gasUrlInp').value.trim();
  if(!url){
    showToast('先にApps Script URLを設定してください', 'ng');
    toggleSetup();
    return;
  }

  try{
    const res = await fetch(url, {method:'GET'});
    const data = await res.json();
    if(Array.isArray(data)){
      contacts = data.map(normalizeContact);
      saveLocal();
      renderAll();
      showToast('Sheetsから同期しました');
    }else{
      showToast('Sheetsの形式が違います', 'ng');
    }
  }catch(e){
    showToast('同期に失敗しました', 'ng');
  }
}

async function pushToSheets(){
  const url = localStorage.getItem(GAS_KEY);
  if(!url) return;

  try{
    await fetch(url, {
      method:'POST',
      body:JSON.stringify({action:'saveAll', data:contacts})
    });
  }catch(e){
    // Apps Script側のCORS/権限設定で失敗する場合があるため、ローカル保存は維持
    console.warn(e);
  }
}

function normalizeContact(p){
  return {
    id: p.id || crypto.randomUUID(),
    name: p.name || '',
    yomi: p.yomi || '',
    company: p.company || '',
    relation: p.relation || '',
    met_date: p.met_date || '',
    phone: p.phone || '',
    email: p.email || '',
    address: p.address || '',
    sns_url: p.sns_url || '',
    mbti: p.mbti || '',
    likes: p.likes || '',
    dislikes: p.dislikes || '',
    note: p.note || '',
    photo_url: p.photo_url || p.photo || '',
    meetings: Array.isArray(p.meetings) ? p.meetings : []
  };
}

function spSearch(showEmpty=true){
  const q = ($('spInput')?.value || '').trim().toLowerCase();
  const box = $('spResults');
  if(!box) return;

  if(!q){
    box.classList.remove('show');
    box.innerHTML = '';
    return;
  }

  const results = contacts.filter(p => {
    const hay = [
      p.name,p.yomi,p.company,p.relation,p.mbti,p.likes,p.dislikes,p.note,p.email,p.phone
    ].join(' ').toLowerCase();
    return hay.includes(q);
  }).slice(0,12);

  if(!results.length){
    box.innerHTML = `<div class="no-result">該当する人が見つかりませんでした</div>`;
    box.classList.add('show');
    return;
  }

  box.innerHTML = results.map(p => `
    <div class="sp-result-item" onclick="openDetail('${p.id}')">
      ${avatarHtml(p)}
      <div class="res-body">
        <div class="res-name">${esc(p.name || '名前なし')}</div>
        <div class="res-sub">${esc([p.company,p.relation,p.mbti].filter(Boolean).join(' / ') || 'メモなし')}</div>
      </div>
    </div>
  `).join('');
  box.classList.add('show');
}

function renderQuick(){
  const grid = $('quickGrid');
  if(!grid) return;

  const recent = [...contacts].reverse().slice(0,6);
  if(!recent.length){
    grid.innerHTML = `
      <div class="empty" style="grid-column:1/-1;padding:30px 10px;">
        <div class="icon">📖</div>
        <h3>まだ登録がありません</h3>
        <p>右下の＋から人物を追加できます</p>
      </div>`;
    return;
  }

  grid.innerHTML = recent.map(p => `
    <div class="quick-card" onclick="openDetail('${p.id}')">
      ${avatarHtml(p)}
      <div class="quick-name">${esc(p.name || '名前なし')}</div>
      <div class="quick-sub">${esc(p.relation || p.company || '')}</div>
    </div>
  `).join('');
}

function buildFilters(){
  const row = $('filterRow');
  if(!row) return;

  const relations = [...new Set(contacts.map(p => p.relation).filter(Boolean))].slice(0,8);
  row.innerHTML = `
    <button class="chip ${activeFilter===''?'active':''}" onclick="setFilter('')">すべて</button>
    ${relations.map(r => `<button class="chip ${activeFilter===r?'active':''}" onclick="setFilter('${esc(r)}')">${esc(r)}</button>`).join('')}
    <div class="count" id="countNote">${contacts.length} 人</div>
  `;
}

function setFilter(f){
  activeFilter = f;
  buildFilters();
  renderList();
}

function renderList(){
  const list = $('cardsList');
  if(!list) return;

  const data = activeFilter ? contacts.filter(p => p.relation === activeFilter) : contacts;

  const count = $('countNote');
  if(count) count.textContent = `${data.length} 人`;

  if(!data.length){
    list.innerHTML = `
      <div class="empty">
        <div class="icon">📖</div>
        <h3>登録がありません</h3>
        <p>右下の＋ボタンから追加してください</p>
      </div>`;
    return;
  }

  list.innerHTML = data.map(p => `
    <div class="person-card" onclick="openDetail('${p.id}')">
      ${avatarHtml(p)}
      <div class="card-body">
        <div>
          <span class="card-name">${esc(p.name || '名前なし')}</span>
          ${p.yomi ? `<span class="card-yomi">${esc(p.yomi)}</span>` : ''}
        </div>
        <div class="card-meta">
          ${p.company ? `<span class="company">${esc(p.company)}</span>` : ''}
          ${p.relation ? `<span class="tag red">${esc(p.relation)}</span>` : ''}
          ${p.mbti ? `<span class="tag blue">${esc(p.mbti)}</span>` : ''}
          ${p.likes ? `<span class="tag green">${esc(p.likes)}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function openAdd(){
  editingId = null;
  $('editTitle').textContent = '✏️ 人物を追加';
  clearForm();
  $('f_met_date').value = today();
  openModal('editOverlay');
}

function clearForm(){
  ['name','yomi','company','relation','met_date','phone','email','address','sns_url','mbti','likes','dislikes','note','photo_url']
    .forEach(k => {
      const el = $('f_' + k);
      if(el) el.value = '';
    });
}

function getFormData(){
  const data = {};
  ['name','yomi','company','relation','met_date','phone','email','address','sns_url','mbti','likes','dislikes','note','photo_url']
    .forEach(k => data[k] = ($('f_' + k)?.value || '').trim());
  return data;
}

function setFormData(p){
  ['name','yomi','company','relation','met_date','phone','email','address','sns_url','mbti','likes','dislikes','note','photo_url']
    .forEach(k => {
      const el = $('f_' + k);
      if(el) el.value = p[k] || '';
    });
}

function saveContact(){
  const data = getFormData();
  if(!data.name){
    showToast('名前を入力してください', 'ng');
    return;
  }

  if(editingId){
    contacts = contacts.map(p => p.id === editingId ? {...p, ...data} : p);
    showToast('更新しました');
  }else{
    contacts.push(normalizeContact({
      id: crypto.randomUUID(),
      ...data,
      meetings:[]
    }));
    showToast('追加しました');
  }

  saveLocal();
  renderAll();
  pushToSheets();
  closeModal('editOverlay');
}

function openDetail(id){
  viewingId = id;
  const p = contacts.find(x => x.id === id);
  if(!p) return;

  $('detailBody').innerHTML = `
    <div class="detail-hero">
      ${p.photo_url ? `<div class="detail-photo"><img src="${esc(p.photo_url)}" alt=""></div>` : `<div class="detail-photo">${esc(initials(p.name))}</div>`}
      <div>
        <div class="detail-name">${esc(p.name || '名前なし')}</div>
        ${p.yomi ? `<div class="detail-yomi">${esc(p.yomi)}</div>` : ''}
        <div class="card-meta" style="margin-top:10px;">
          ${p.relation ? `<span class="tag red">${esc(p.relation)}</span>` : ''}
          ${p.mbti ? `<span class="tag blue">${esc(p.mbti)}</span>` : ''}
          ${p.likes ? `<span class="tag green">${esc(p.likes)}</span>` : ''}
        </div>
      </div>
    </div>

    <div class="note-block bg-y">
      <div class="block-title">📌 基本情報</div>
      <div class="info-grid">
        ${info('会社 / 所属', p.company)}
        ${info('関係', p.relation)}
        ${info('初めて会った日', p.met_date)}
        ${info('MBTI', p.mbti)}
      </div>
    </div>

    <div class="note-block bg-b">
      <div class="block-title">📞 連絡先</div>
      <div class="info-grid">
        ${info('電話番号', p.phone)}
        ${info('メール', p.email ? `<a href="mailto:${esc(p.email)}">${esc(p.email)}</a>` : '', true)}
        ${info('住所', p.address, false, 'full')}
        ${info('SNS', p.sns_url ? `<a href="${esc(p.sns_url)}" target="_blank">開く</a>` : '', true, 'full')}
      </div>
    </div>

    <div class="note-block bg-g">
      <div class="block-title">🌿 趣味・嗜好</div>
      <div class="info-grid">
        ${info('好きなもの', p.likes)}
        ${info('苦手なもの', p.dislikes)}
      </div>
    </div>

    <div class="note-block bg-p">
      <div class="block-title">📝 メモ</div>
      <div class="info-val">${esc(p.note || 'メモはありません')}</div>
    </div>

    <div class="note-block bg-y">
      <div class="block-title">🗓 会った記録</div>
      <div id="meetingsBox">
        ${renderMeetings(p)}
      </div>
      <div class="add-meeting">
        <input id="meetDate" type="date" value="${today()}">
        <input id="meetNote" type="text" placeholder="会話メモ">
        <button class="btn btn-primary" onclick="addMeeting()">追加</button>
      </div>
    </div>
  `;

  openModal('detailOverlay');
}

function info(label, value, raw=false, extra=''){
  return `
    <div class="info ${extra}">
      <div class="info-label">${esc(label)}</div>
      <div class="info-val">${value ? (raw ? value : esc(value)) : '—'}</div>
    </div>
  `;
}

function renderMeetings(p){
  if(!p.meetings || !p.meetings.length){
    return `<div class="info-val">まだ記録がありません</div>`;
  }
  return p.meetings.map(m => `
    <div class="meeting">
      <div class="meet-date">${esc(m.date || '')}</div>
      <div class="meet-note">${esc(m.note || '')}</div>
    </div>
  `).join('');
}

function addMeeting(){
  const p = contacts.find(x => x.id === viewingId);
  if(!p) return;
  const date = $('meetDate').value || today();
  const note = $('meetNote').value.trim();
  if(!note){
    showToast('メモを入力してください', 'ng');
    return;
  }
  p.meetings = Array.isArray(p.meetings) ? p.meetings : [];
  p.meetings.push({date, note});
  saveLocal();
  renderAll();
  pushToSheets();
  openDetail(p.id);
  showToast('会った記録を追加しました');
}

function openEditFromDetail(){
  const p = contacts.find(x => x.id === viewingId);
  if(!p) return;
  editingId = p.id;
  $('editTitle').textContent = '✏️ プロフィールを編集';
  setFormData(p);
  closeModal('detailOverlay');
  openModal('editOverlay');
}

function deleteContact(){
  const p = contacts.find(x => x.id === viewingId);
  if(!p) return;
  if(!confirm(`${p.name || 'この人物'}を削除しますか？`)) return;

  contacts = contacts.filter(x => x.id !== viewingId);
  viewingId = null;
  saveLocal();
  renderAll();
  pushToSheets();
  closeModal('detailOverlay');
  showToast('削除しました');
}

function openModal(id){
  $(id).classList.add('open');
}

function closeModal(id){
  $(id).classList.remove('open');
}

function bgClose(e,id){
  if(e.target.id === id) closeModal(id);
}

document.addEventListener('DOMContentLoaded', () => {
  loadLocal();
});
function handlePhotoFile(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    const dataUrl = e.target.result;

    document.getElementById('f_photo_url').value = dataUrl;

    const preview = document.getElementById('photoPreview');
    preview.src = dataUrl;
    preview.style.display = 'block';
  };

  reader.readAsDataURL(file);
}
</script>
</body>
</html>
